[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', block = true, desc = "Editar", for = "unix" },
]
zathura = [{ run = 'zathura "$@"', orphan = true, desc = "Ver con Zathura" }]
extract = [
  { run = 'ouch d -y "$@"', desc = "Extraer con ouch", for = "unix" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/pdf", use = "zathura" },
  { mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", use = "extract" },
]

[[plugin.prepend_previewers]]
mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}"
run = "ouch"

[[plugin.prepend_previewers]]
mime = "text/markdown"
run = "glow"
