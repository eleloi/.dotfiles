############################
##  Configuration
############################

## use 256 term for pretty colors
set -ga terminal-overrides ",*256col*:Tc"
set -g default-terminal "tmux-256color"

## increase scroll-back history
set -g history-limit 8000

## use vim key bindings
setw -g mode-keys vi

## copy to system clipboard
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

## decrease command delay (increases vim responsiveness)
set -sg escape-time 1

## increase repeat time for repeatable commands
set -g repeat-time 1000

## start window index at 1
set -g base-index 1

## start pane index at 1
setw -g pane-base-index 1

##disable auto rename
set-option -g allow-rename off

## re-number windows when one is closed
set -g renumber-windows on

##  Key Bindings
############################

## tmux prefix
unbind C-b
set -g prefix C-a
set -g mouse on

## window splitting
unbind %
bind | split-window -h -c '#{pane_current_path}'
bind \\ split-window -h -c '#{pane_current_path}'

unbind '"'
bind - split-window -v -c '#{pane_current_path}'

bind = select-layout even-horizontal
bind _ select-layout -E

bind Space if-shell -F "#{?@window_maximized,1,0}" \
    "set -uw @window_maximized; select-layout -E" \
    "set -w @window_maximized 1; resize-pane -y 999"

bind-key -r j select-pane -D \; set -w @window_maximized 1 \; resize-pane -y 999
bind-key -r k select-pane -U \; set -w @window_maximized 1 \; resize-pane -y 999


bind c new-window -c '#{pane_current_path}'
bind M-c new-session

bind-key \} swap-window -t +1\; select-window -t +1
bind-key \{ swap-window -t -1\; select-window -t -1

bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

bind-key u switch-client -p
bind-key i switch-client -n

bind C-a last-window

## force a reload of the config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

## Status update interval
set -g status-interval 1

## Clock mode
set -g clock-mode-colour colour24
set -g clock-mode-style 24

# Will go next session on killing a session
set-option -g detach-on-destroy off

## Plugins
##################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux#latest'
set -g @plugin 'laktak/extrakto'

set-option -g status-position top
set -g status-style bg=default

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_flags "icon"

set -g @catppuccin_window_flags_icon_last " 🏷"
set -g @catppuccin_window_flags_icon_current " 👀"
set -g @catppuccin_window_flags_icon_zoom " 🔎"
set -g @catppuccin_window_flags_icon_mark " 🔺"
set -g @catppuccin_window_flags_icon_silent " 🔇"
set -g @catppuccin_window_flags_icon_activity " 🛎"
set -g @catppuccin_window_flags_icon_bell " 🛎"

set -g @catppuccin_window_text " #{window_name}" 
set -g @catppuccin_window_current_text " #{window_name}" 

set -g @catppuccin_window_current_text_color "#{@thm_surface_1}"
set -g @catppuccin_window_current_number_color "#{@thm_pink}"

set -g @catppuccin_pane_default_text "#{window_name}"

set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""

set -g status-right ""
set -agF status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #[default]#[bg=#{@thm_bg}]##(tmux ls -F '####{?session_attached,#[fg=#{@thm_bg} bg=#{@thm_blue} bold] ####S #[default],#[fg=#{@thm_overlay_0} bg=#{@thm_bg}] ####S #[default]}' | tr '\\n' ' ') "
set -agF status-right "#[bg=#{@thm_bg},fg=#{@thm_green}] /##H/ "
set -agF status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] %H:%M "


# Resurrect keys
set -g @resurrect-save 'W'
set -g @resurrect-restore 'R'

# Tmux FZF
unbind f
TMUX_FZF_LAUNCH_KEY="C-s"
bind-key s run-shell -b "/home/eleloi/.config/tmux/plugins/tmux-fzf/scripts/session.sh"
bind-key P run-shell -b "/home/eleloi/.config/tmux/plugins/tmux-fzf/scripts/clipboard.sh"

# sesh
unbind t
bind-key "t" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run -b '~/.config/tmux/plugins/tpm/tpm'
