"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "eleloi"
email = "evallverdu@mossos.cat"

[signing]
behavior = "own"
backend = "gpg"
key = "A8A8882C5990AEB6"

[revsets]
log = "ancestors(@, 10) | main | working_copies() | bookmarks()"

[ui]
default-command = "log"
pager = "delta"
diff-formatter = ":git"
diff-editor = ["nvim", "-c", "DiffEditor $left $right $output"]

[merge-tools.diffconflicts]
program = "nvim"
merge-args = [
    "-c",
    "let g:jj_diffconflicts_marker_length=$marker_length",
    "-c",
    "JJDiffConflicts!",
    "$output",
    "$base",
    "$left",
    "$right",
]
merge-tool-edits-conflict-markers = true
