[metadata]
name = "nix"
description = "A channel to select from your nix config files"
requirements = ["fd", "bat"]

[source]
command = "fd -t f . $HOME/nixos-config"

[preview]
command = "bat -n --color=always '{}'"

[keybindings]
enter = "actions:edit"

[actions.edit]
description = "Opens the selected entries with the default editor (falls back to vim)"
command = "${EDITOR:-vim} '{}'"
# use `mode = "fork"` if you want to return to tv afterwards
mode = "execute"
